name: Release Windows Build

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Run static checks
        run: uv run ty check

      - name: Run tests
        run: uv run pytest

      - name: Compute release tag
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          "MC_SERVER_MANAGER_RELEASE_TAG=main-${{ github.run_number }}-$shortSha" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MC_SERVER_MANAGER_COMMIT_SHA=${{ github.sha }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MC_SERVER_MANAGER_REPO_OWNER=${{ github.repository_owner }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MC_SERVER_MANAGER_REPO_NAME=${{ github.event.repository.name }}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Windows release artifacts
        run: uv run python tools/packaging/build_windows_release.py

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.MC_SERVER_MANAGER_RELEASE_TAG }}
          name: ${{ env.MC_SERVER_MANAGER_RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/windows-release/mc-server-manager-installer.exe
            dist/windows-release/mc-server-manager-windows-x64.zip
            dist/windows-release/SHA256SUMS.txt
